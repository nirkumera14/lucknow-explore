version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: lucknow-explore-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: lucknow-explore
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  # Backend API
  backend:
    build: ./backend
    container_name: lucknow-explore-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/lucknow-explore
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_super_secret_key_2024}
      JWT_EXPIRE: 30d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: lucknow-explore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
